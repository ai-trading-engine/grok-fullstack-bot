<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FullStackBuilder — Powered by Grok</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui; }
    .chat { max-height: 80vh; overflow-y-auto; }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-4xl mx-auto p-4">
    <h1 class="text-4xl font-bold text-center mb-8 text-emerald-400">FullStackBuilder</h1>
    <div id="chat" class="chat bg-zinc-900 rounded-2xl p-6 space-y-6"></div>
    
    <div class="mt-6 flex gap-2">
      <input id="input" type="text" class="flex-1 bg-zinc-800 rounded-xl px-6 py-4 focus:outline-none" 
             placeholder="Build me a Twitter clone with Node + React...">
      <button onclick="send()" class="bg-emerald-500 hover:bg-emerald-600 px-8 rounded-xl font-bold">Send</button>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');

    function addMessage(text, isUser) {
      const div = document.createElement('div');
      div.className = isUser ? 'text-right' : 'text-left';
      div.innerHTML = `
        <div class="${isUser ? 'bg-emerald-600' : 'bg-zinc-800'} inline-block max-w-[85%] rounded-2xl px-6 py-4">
          ${text.replace(/\n/g, '<br>')}
        </div>
      `;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;
      addMessage(text, true);
      input.value = '';

      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ messages: [{role: "user", content: text}] })
      });
      
      const data = await res.json();
      addMessage(data.reply, false);
    }

    // Example starter message
    addMessage("Hi! Describe any app and I'll build the full frontend + backend (Node or Python) instantly.", false);
  </script>
</body>
</html>
